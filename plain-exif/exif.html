<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <title>EXIF Data Viewer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>EXIF Data Viewer</h1>
      <p>Extract and view image metadata locally in your browser.</p>
    </header>

    <section id="dropzone" class="dropzone" tabindex="0" role="button" aria-label="Upload images">
      <input id="fileInput" type="file" accept="image/*" multiple hidden />
      <p class="drop-title">Drop images here or click to upload</p>
      <p class="drop-sub">Best support JPG, PNG, TIFF, RAW)</p>
    </section>

    <section class="toolbar">
      <button id="expandAll" type="button">Expand All</button>
      <button id="collapseAll" type="button">Collapse All</button>
      <span id="status" class="status"></span>
    </section>

    <section id="results" class="results"></section>
  </main>

  <footer class="credits" aria-label="Credits">
    <p>Credits: Phil Harvey, imagy.app, Oliver Betz</p>
  </footer>

  <template id="cardTpl">
    <article class="card">
      <div class="left">
        <img class="preview" alt="Preview" />
      </div>
      <div class="right">
        <h2 class="name"></h2>
        <div class="grid basic"></div>
        <div class="sections"></div>
      </div>
    </article>
  </template>

  <template id="sectionTpl">
    <details class="section" open>
      <summary></summary>
      <div class="grid section-grid"></div>
    </details>
  </template>

  <script src="./exif-wasm.js"></script>
  <script src="./app.js"></script>
</body>
</html>
